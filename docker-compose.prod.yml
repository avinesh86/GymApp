version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn fitops.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class gthread --threads 2 --timeout 120 --max-requests 1000 --max-requests-jitter 50
    env_file: .env
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    deploy:
      replicas: 2

  worker:
    build: .
    command: scripts/celery-entrypoint.sh worker
    env_file: .env
    volumes:
      - media_files:/app/media
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  beat:
    build: .
    command: scripts/celery-entrypoint.sh beat
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: always

volumes:
  mysql_data:
  media_files:
  static_files:
