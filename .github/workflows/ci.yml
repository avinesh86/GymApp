name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: fitops.settings.ci
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      FIELD_ENCRYPTION_KEY: RFhRaklBYlZJVWRfZm50RmhzUWVLYkhKdGxfX0Y1RGM9
      PYTHONPATH: ${{ github.workspace }}
      # Dummy values so base.py imports without error (ci.py overrides DATABASES)
      MYSQL_DATABASE: unused
      MYSQL_USER: unused
      MYSQL_PASSWORD: unused

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 \
            libcairo2 libffi-dev shared-mime-info \
            default-libmysqlclient-dev pkg-config

      - name: Install Python dependencies
        run: pip install -r requirements/ci.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run --settings=fitops.settings.ci

      - name: Run tests with coverage
        run: |
          pytest \
            --ds=fitops.settings.ci \
            --tb=short \
            -v \
            --cov=apps \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check apps/ tests/ fitops/ --config=ruff.toml --output-format=github

      - name: Run ruff format check
        run: ruff format --check apps/ tests/ fitops/
        continue-on-error: true

  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
